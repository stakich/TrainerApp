{% load static %}

<header>

  
<nav class="navbar">
        <div class="container">
             <a class="navbar-brand" href="/">
                <img src="{% static 'images/download.png' %}" alt="TrainerApp Logo" class="logo">
            </a>

            <div class="navbar-links">
                <a class="nav-link" href="#">Home</a>
                <a class="nav-link" href="#">Search</a>
                <a class="nav-link" href="#">Trainers</a>
                <a class="nav-link" href="#">About</a>
                <a class="nav-link" href="#">Contact</a>
            </div>

            <!-- Action Buttons (Profile, Login, etc.) -->
            <div class="action-buttons">
                {% if user.is_authenticated %}
                    <a href="#" class="btn btn-profile">Profile</a>
                    <a href="#" class="btn btn-logout">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-profile">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-logout">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
</header>
